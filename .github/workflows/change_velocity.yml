name: prod-deployment-with-change-velocity

on:
  workflow_dispatch:

jobs:
  test-job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Simulate pipeline
        run: |
          echo "Running fake pipeline..."
          sleep 2
          echo "Tests passed, build complete"

  prod-deploy:
    runs-on: ubuntu-latest
    needs: test-job

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: ServiceNow Change Gate
        uses: ServiceNow/servicenow-devops-change@v5.1.0
        id: sn-change
        with:
          devops-integration-token: ${{ secrets.SN_DEVOPS_INTEGRATION_TOKEN }}
          instance-url:             ${{ vars.SN_INSTANCE_URL }}
          tool-id:                  ${{ vars.SN_ORCHESTRATION_TOOL_ID }}
          context-github:           ${{ toJSON(github) }}
          job-name:                 'prod-deploy'
          change-request: >-
            {"setCloseCode":"true","autoCloseChange":true,"attributes":{"short_description":"Prod deploy — ${{ github.repository }} @ ${{ github.sha }}","description":"Triggered by ${{ github.actor }} run ${{ github.run_id }}","implementation_plan":"Deploy via GitHub Actions SHA ${{ github.sha }}","backout_plan":"Rollback to last stable release","test_plan":"Automated pipeline validation","assignment_group":"${{ vars.SN_ASSIGNMENT_GROUP_SYS_ID }}","assigned_to":"${{ vars.SN_ASSIGNED_TO_SYS_ID }}"}}
          interval: '10'
          timeout: '3600'
          changeCreationTimeOut: '3600'
          abortOnChangeCreationFailure: true
          abortOnChangeStepTimeout: true

      - name: Deploy app
        run: |
          echo "Deploying fake app..."
          sleep 5
          echo "Deployment complete"

      - name: Done
        run: echo "Deployment + change lifecycle complete"